<VirtualHost *:80>
  ServerName gev-temporary.bochenek.ch
  DocumentRoot "/var/www/gev"
  # (base) mikey@bochenek:/etc/apache2/sites-available$ more gevt.conf 
  # DocumentRoot "/var/www/gev"
  <Directory /var/www/gev>
        Options Indexes FollowSymLinks
        AllowOverride All
        Order allow,deny
        Allow from all
  </Directory>
RewriteEngine on
RewriteCond %{SERVER_NAME} =gev-temporary.bochenek.ch
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>